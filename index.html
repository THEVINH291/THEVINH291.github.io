<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quy Nhơn AI Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl w-full text-center text-white">
        <header class="mb-10">
            <h1 class="text-4xl md:text-5xl font-bold tracking-widest uppercase mb-2">Quy Nhơn</h1>
            <h2 class="text-2xl md:text-3xl font-semibold text-orange-400 tracking-wider">AI EXPLORER</h2>
            <p class="text-gray-300 mt-2 font-light italic">Trợ lý Thổ Địa Ảo của bạn</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 px-4">
            
            <div onclick="openFeature('Chatbot Thổ Địa')" class="glass-card rounded-2xl p-8 flex flex-col items-center justify-center gap-4">
                <i class="fa-regular fa-comments text-4xl"></i>
                <span class="text-lg font-medium">Chatbot Thổ Địa</span>
            </div>

            <div onclick="openFeature('Bản đồ Khám phá')" class="glass-card rounded-2xl p-8 flex flex-col items-center justify-center gap-4">
                <i class="fa-solid fa-location-dot text-4xl"></i>
                <span class="text-lg font-medium">Bản đồ Khám phá</span>
            </div>

            <div onclick="openFeature('Audio Thuyết minh')" class="glass-card rounded-2xl p-8 flex flex-col items-center justify-center gap-4">
                <i class="fa-solid fa-headphones text-4xl"></i>
                <span class="text-lg font-medium">Audio Thuyết minh</span>
            </div>

            <div onclick="openFeature('Học Tiếng Nẫu')" class="glass-card rounded-2xl p-8 flex flex-col items-center justify-center gap-4">
                <i class="fa-solid fa-book-open text-4xl"></i>
                <span class="text-lg font-medium">Học Tiếng Nẫu</span>
            </div>

        </div>

        <footer class="mt-12 text-gray-400 text-sm">
            &copy; 2026 Dự án STEM - Lớp 11A2 - THPT Bùi Thị Xuân
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="glass-panel w-full max-w-lg overflow-hidden flex flex-col relative" style="height: 80vh;">
            <div class="p-4 border-b border-white/10 flex justify-between items-center text-white">
                <h3 id="modal-title" class="font-bold uppercase tracking-widest">Tính năng</h3>
                <button onclick="closeModal()"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div id="modal-content" class="flex-1 overflow-y-auto p-4 text-white text-left no-scrollbar">
                </div>

            <div id="chat-input-area" class="p-4 border-t border-white/10 hidden">
                <div class="relative">
                    <input type="text" id="ai-input" placeholder="Hỏi Anh Tư Nẫu..." class="w-full bg-white/10 border border-white/20 rounded-full py-3 px-5 text-white focus:outline-none focus:ring-2 focus:ring-orange-400">
                    <button class="absolute right-3 top-2 text-orange-400 p-1 px-3">Gửi</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openFeature(name) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            const chatArea = document.getElementById('chat-input-area');

            modal.classList.remove('hidden');
            title.innerText = name;
            
            if (name === 'Chatbot Thổ Địa') {
                chatArea.classList.remove('hidden');
                content.innerHTML = `
                    <div class="bg-white/10 p-3 rounded-lg mb-4 text-sm">
                        <b>Anh Tư:</b> Chu cha, chào bạn nha! Muốn ăn chi, chơi chi ở Quy Nhơn cứ hỏi tui chỉ cho dẫy nhen!
                    </div>
                `;
            } else if (name === 'Học Tiếng Nẫu') {
                chatArea.classList.add('hidden');
                content.innerHTML = `
                    <ul class="space-y-4">
                        <li class="bg-white/5 p-3 rounded-lg"><b>Chu cha:</b> Từ biểu thị sự ngạc nhiên.</li>
                        <li class="bg-white/5 p-3 rounded-lg"><b>Dẫy nhen:</b> Vậy nhé.</li>
                        <li class="bg-white/5 p-3 rounded-lg"><b>Nẫu:</b> Họ/Người ta.</li>
                    </ul>
                `;
            } else {
                chatArea.classList.add('hidden');
                content.innerHTML = `<p class="text-center opacity-50 mt-10 italic">Tính năng [${name}] đang được cập nhật...</p>`;
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
