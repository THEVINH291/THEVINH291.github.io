<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quy Nhơn AI Explorer - Trợ Lý Thổ Địa</title>
    <link rel="icon" type="image/png" href="https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/main/logo.png?raw=true">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/950bcf7605a0349ff66bec673b9f817955a43a0d/R.png?raw=true') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            background: rgba(251, 146, 60, 0.2);
            transform: translateY(-8px);
            border-color: rgba(251, 146, 60, 0.5);
        }

        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 8px;
            animation: fadeIn 0.3s ease;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #chat-box { scroll-behavior: smooth; }
    </style>
</head>
<body class="p-4 flex items-center justify-center">

    <div class="max-w-5xl w-full text-center text-white py-10">
        <header class="mb-12">
            <div class="inline-block px-4 py-1 rounded-full bg-orange-500/20 text-orange-400 text-sm font-semibold mb-4 border border-orange-500/30">
                AI First – BTSX (Lớp 11A2)
            </div>
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-2 uppercase">Quy Nhơn</h1>
            <h2 class="text-2xl md:text-3xl font-bold text-orange-400 tracking-[0.2em] mb-4">AI EXPLORER</h2>
            <p class="text-gray-300 max-w-lg mx-auto font-light leading-relaxed">Khám phá vẻ đẹp xứ Nẫu với sự hỗ trợ của trí tuệ nhân tạo. Ăn gì, chơi đâu, nói tiếng bản địa thế nào? Có tui lo!</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 px-2">
            <div onclick="openFeature('Chatbot Thổ Địa')" class="glass-card rounded-3xl p-8 flex flex-col items-center gap-4 cursor-pointer">
                <div class="w-16 h-16 rounded-2xl bg-blue-500/20 flex items-center justify-center text-blue-400 text-3xl">
                    <i class="fa-regular fa-comments"></i>
                </div>
                <h3 class="font-bold text-lg text-white">Anh Tư Nẫu</h3>
            </div>

            <div onclick="openFeature('Bản đồ Khám phá')" class="glass-card rounded-3xl p-8 flex flex-col items-center gap-4 cursor-pointer">
                <div class="w-16 h-16 rounded-2xl bg-green-500/20 flex items-center justify-center text-green-400 text-3xl">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <h3 class="font-bold text-lg text-white">Điểm Check-in</h3>
            </div>

            <div onclick="openFeature('Audio Thuyết minh')" class="glass-card rounded-3xl p-8 flex flex-col items-center gap-4 cursor-pointer">
                <div class="w-16 h-16 rounded-2xl bg-purple-500/20 flex items-center justify-center text-purple-400 text-3xl">
                    <i class="fa-solid fa-headphones"></i>
                </div>
                <h3 class="font-bold text-lg text-white">Audio Guide</h3>
            </div>

            <div onclick="openFeature('Học Tiếng Nẫu')" class="glass-card rounded-3xl p-8 flex flex-col items-center gap-4 cursor-pointer">
                <div class="w-16 h-16 rounded-2xl bg-orange-500/20 flex items-center justify-center text-orange-400 text-3xl">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <h3 class="font-bold text-lg text-white">Học Tiếng "Nẫu"</h3>
            </div>
        </div>

        <footer class="mt-16 text-gray-400 text-sm">
            <p>&copy; 2026 AI First – BTSX - Trường THPT Bùi Thị Xuân</p>
            <div class="flex justify-center mt-4">
                <a href="https://www.facebook.com/profile.php?id=100094880366095" target="_blank">
                    <i class="fab fa-facebook text-3xl hover:text-blue-500 hover:scale-110 transition-all cursor-pointer"></i>
                </a>
            </div>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="glass-panel w-full max-w-2xl overflow-hidden flex flex-col relative" style="height: 85vh;">
            <div class="p-6 border-b border-white/10 flex justify-between items-center text-white">
                <div class="flex items-center gap-3">
                    <div id="modal-icon" class="text-2xl text-orange-400"></div>
                    <h3 id="modal-title" class="font-bold text-xl uppercase"></h3>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div id="modal-content" class="flex-1 overflow-y-auto p-6 text-white no-scrollbar"></div>

            <div id="chat-input-area" class="p-4 bg-white/5 border-t border-white/10 hidden">
                <form onsubmit="sendMessage(event)" class="relative flex gap-2">
                    <input type="text" id="ai-input" placeholder="Hỏi Anh Tư về món ăn, đường đi..." 
                           class="flex-1 bg-white/10 border border-white/20 rounded-2xl py-4 px-6 text-white focus:outline-none focus:ring-2 focus:ring-orange-500/50">
                    <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white w-14 rounded-2xl transition-colors">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // CẤU HÌNH API (Thay bằng Key đã được giới hạn của bạn)
        const API_KEY = 'AIzaSyD4FUZw6g9m2iUcEk67hVFk7yC68JMUCB0'; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

        const features = {
            'Chatbot Thổ Địa': {
                icon: '<i class="fa-regular fa-comments"></i>',
                content: `<div id="chat-box" class="space-y-4 flex flex-col">
                            <div class="chat-bubble bg-orange-500/20 text-orange-100 self-start border border-orange-500/20">
                                <b>Anh Tư:</b> Chu cha! Chào Vinh nhen. Tui là Anh Tư Nẫu. Bạn muốn hỏi chỗ ăn ngon hay cảnh đẹp Bình Định cứ nói tui nghe!
                            </div>
                         </div>`
            },
            'Bản đồ Khám phá': {
                icon: '<i class="fa-solid fa-location-dot"></i>',
                content: `<div class="space-y-4">
                            <div class="bg-white/5 p-4 rounded-2xl flex gap-4 border border-white/10">
                                <img src="https://raw.githubusercontent.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/main/kyco4.jpg" class="w-24 h-24 object-cover rounded-xl">
                                <div><h4 class="font-bold text-orange-400">Kỳ Co - Eo Gió</h4><p class="text-sm">"Maldives của Việt Nam" - Nước xanh ngắt luôn.</p></div>
                            </div>
                            <div class="bg-white/5 p-4 rounded-2xl flex gap-4 border border-white/10">
                                <img src="https://raw.githubusercontent.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/main/thapdoi.jpg" class="w-24 h-24 object-cover rounded-xl">
                                <div><h4 class="font-bold text-orange-400">Tháp Đôi</h4><p class="text-sm">Kiến trúc Chăm cổ kính ngay lòng thành phố.</p></div>
                            </div>
                         </div>`
            },
            'Audio Thuyết minh': {
                icon: '<i class="fa-solid fa-headphones"></i>',
                content: `<div class="space-y-3">
                            <div class="flex items-center justify-between bg-white/5 p-4 rounded-xl"><span>Sự tích Đầm Thị Nại</span><i class="fa-solid fa-circle-play text-orange-500 text-2xl"></i></div>
                            <div class="flex items-center justify-between bg-white/5 p-4 rounded-xl"><span>Huyền thoại Võ Tây Sơn</span><i class="fa-solid fa-circle-play text-orange-500 text-2xl"></i></div>
                         </div>`
            },
            'Học Tiếng Nẫu': {
                icon: '<i class="fa-solid fa-book-open"></i>',
                content: `<div class="grid grid-cols-1 gap-2">
                            <div class="bg-white/5 p-3 rounded-lg border border-white/10"><b>Nẫu:</b> Người ta / Họ</div>
                            <div class="bg-white/5 p-3 rounded-lg border border-white/10"><b>Chu cha:</b> Trời ơi (cảm thán)</div>
                            <div class="bg-white/5 p-3 rounded-lg border border-white/10"><b>Dìa:</b> Về</div>
                         </div>`
            }
        };

        function openFeature(name) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-icon').innerHTML = features[name].icon;
            document.getElementById('modal-content').innerHTML = features[name].content;
            
            if (name === 'Chatbot Thổ Địa') {
                document.getElementById('chat-input-area').classList.remove('hidden');
            } else {
                document.getElementById('chat-input-area').classList.add('hidden');
            }
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('ai-input');
            const chatBox = document.getElementById('chat-box');
            const text = input.value.trim();
            if (!text) return;

            // User Chat
            chatBox.innerHTML += `<div class="chat-bubble bg-white/10 self-end ml-auto"><b>Bạn:</b> ${text}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // AI Chat
            async function getAIResponse(userText) {
    const prompt = `Bạn là "Anh Tư", một người Bình Định nhiệt tình. Trả lời ngắn gọn (dưới 50 từ). Sử dụng từ địa phương (nhen, nghen, chu cha, dẫy na). Tư vấn du lịch Quy Nhơn. Câu hỏi: ${userText}`;
    
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        
        const data = await response.json();

        // NẾU GOOGLE BÁO LỖI (Bao gồm cả lỗi 404, sai Key, chưa bật API...)
        if (!response.ok) {
            console.error("LỖI CHI TIẾT TỪ GOOGLE:", data);
            return `Anh Tư bị kẹt rồi: ${data.error ? data.error.message : 'Lỗi không xác định'}`;
        }

        // NẾU THÀNH CÔNG
        return data.candidates[0].content.parts[0].text;
        
    } catch (e) {
        console.error("Lỗi đứt mạng hoặc sai code:", e);
        return "Chu cha, mạng yếu quá tui nghe hổng rõ. Nói lại nhen!";
    }
}
    </script>
</body>
</html>
