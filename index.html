<script>
    // API Key của Vinh đã được dán vào đây
    const API_KEY = AIzaSyDrivva6o13JLgeXniOe6zIqVDOFaAcKdY; 

    // Cấu hình tính cách cho AI
    const SYSTEM_PROMPT = `Bạn là "Anh Tư", một người dân bản địa Quy Nhơn, Bình Định. 
    Phong cách: Vui vẻ, nhiệt tình, sử dụng phương ngữ "tiếng Nẫu" một cách tự nhiên (chu cha, dẫy nhen, ngon bá chấy, rẻ rề...).
    Kiến thức: Am hiểu các quán ăn quanh trường THPT Bùi Thị Xuân, các hidden gem và các điểm du lịch như Kỳ Co, Eo Gió.
    Nhiệm vụ: Trả lời câu hỏi của du khách một cách thân thiện nhất.`;

    function openFeature(name) {
        const modal = document.getElementById('modal');
        const title = document.getElementById('modal-title');
        const content = document.getElementById('modal-content');
        const chatArea = document.getElementById('chat-input-area');

        modal.classList.remove('hidden');
        title.innerText = name;
        
        if (name === 'Chatbot Thổ Địa') {
            chatArea.classList.remove('hidden');
            if (content.innerHTML.trim() === "") {
                content.innerHTML = `<div class="bg-white/10 p-3 rounded-lg mb-4 text-sm border-l-4 border-orange-400"><b>Anh Tư:</b> Chu cha, chào bạn nha! Muốn ăn chi, chơi chi ở Quy Nhơn cứ hỏi tui chỉ cho dẫy nhen!</div>`;
            }
        } else if (name === 'Học Tiếng Nẫu') {
            chatArea.classList.add('hidden');
            content.innerHTML = `
                <ul class="space-y-4">
                    <li class="bg-white/5 p-3 rounded-lg border border-white/10 text-sm"><b>Chu cha:</b> Từ biểu thị sự ngạc nhiên.</li>
                    <li class="bg-white/5 p-3 rounded-lg border border-white/10 text-sm"><b>Dẫy nhen:</b> Vậy nhé / Thế nhé.</li>
                    <li class="bg-white/5 p-3 rounded-lg border border-white/10 text-sm"><b>Nẫu:</b> Họ / Người ta (Dùng để chỉ người thứ ba).</li>
                    <li class="bg-white/5 p-3 rounded-lg border border-white/10 text-sm"><b>Mè nheo:</b> Phàn nàn, mè nheo.</li>
                </ul>
            `;
        } else if (name === 'Bản đồ Khám phá') {
            chatArea.classList.add('hidden');
            content.innerHTML = `<div class="rounded-xl overflow-hidden h-full"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d62057.94723049104!2d109.196749!3d13.782069!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x316f6b5030e48731%3A0x67c5364161741496!2zUXV5IE5oxqFuLCBCw6xuaCDEkOG7i25oLCBWaeG7h3QgTmFt!5e0!3m2!1svi!2s!4v1700000000000" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe></div>`;
        } else {
            chatArea.classList.add('hidden');
            content.innerHTML = `<p class="text-center opacity-50 mt-10 italic">Tính năng [${name}] đang được cập nhật...</p>`;
        }
    }

    async function handleChat() {
        const inputField = document.getElementById('ai-input');
        const contentArea = document.getElementById('modal-content');
        const message = inputField.value.trim();
        
        if (!message) return;

        // Hiện tin nhắn người dùng
        contentArea.innerHTML += `<div class="text-right mb-4"><span class="bg-orange-500/30 px-4 py-2 rounded-2xl rounded-tr-none text-sm inline-block border border-orange-500/20">${message}</span></div>`;
        inputField.value = '';
        contentArea.scrollTop = contentArea.scrollHeight;

        // Hiệu ứng chờ
        const loadingId = "loading-" + Date.now();
        contentArea.innerHTML += `<div id="${loadingId}" class="mb-4 text-xs italic opacity-60 flex items-center gap-2"><i class="fa-solid fa-spinner animate-spin"></i> Anh Tư đang nhớ lại...</div>`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: SYSTEM_PROMPT + "\\nNgười dùng hỏi: " + message }] }]
                })
            });
            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            document.getElementById(loadingId).remove();
            contentArea.innerHTML += `<div class="bg-white/10 p-3 rounded-2xl rounded-tl-none mb-4 text-sm border border-white/10"><b>Anh Tư:</b> ${aiText}</div>`;
        } catch (e) {
            document.getElementById(loadingId).innerHTML = "Chu cha, mạng mẽo bị chi rồi, Vinh kiểm tra lại nhen!";
        }
        contentArea.scrollTop = contentArea.scrollHeight;
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
    }

    // Lắng nghe sự kiện nút gửi và phím Enter
    document.querySelector('#chat-input-area button').onclick = handleChat;
    document.getElementById('ai-input').onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };
</script>
