<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tư Nẫu AI - Trợ lý Du lịch Quy Nhơn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #f0f9ff; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .chat-container { height: calc(100vh - 180px); }
        .bubble-ai { border-radius: 20px 20px 20px 5px; }
        .bubble-user { border-radius: 20px 20px 5px 20px; background: #0284c7; color: white; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen flex flex-col relative overflow-hidden">

    <header class="p-4 glass sticky top-0 z-10 border-b border-blue-100 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl shadow-lg">
                <i class="fa-solid fa-face-smile-wink"></i>
            </div>
            <div>
                <h1 class="font-bold text-blue-900 text-lg">Anh Tư Nẫu <span class="text-xs font-normal bg-green-100 text-green-600 px-2 py-0.5 rounded-full ml-1">Online</span></h1>
                <p class="text-xs text-gray-500 italic">"Ăn chi, đi đâu tui chỉ cho!"</p>
            </div>
        </div>
        <button class="text-blue-600"><i class="fa-solid fa-ellipsis-vertical text-xl"></i></button>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container">
        <div class="flex items-start gap-2">
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-sm">Tư</div>
            <div class="bubble-ai bg-white p-3 shadow-sm border border-blue-50 text-sm leading-relaxed max-w-[85%]">
                Chu cha, chào bạn nha! Tui là <b>Tư Nẫu</b> nè. Bạn mới tới Quy Nhơn chơi hay sao? Muốn tìm quán ăn gần trường Bùi Thị Xuân hay đi Kỳ Co, Eo Gió chi cứ hỏi tui, tui chỉ cho dẫy nhen! 🌊☀️
            </div>
        </div>
    </main>

    <div class="px-4 py-2 flex gap-2 overflow-x-auto no-scrollbar whitespace-nowrap">
        <button onclick="quickAsk('Quán ăn gần trường Bùi Thị Xuân?')" class="text-xs bg-white border border-blue-200 px-3 py-1.5 rounded-full shadow-sm text-blue-700">🍜 Ăn vặt gần đây</button>
        <button onclick="quickAsk('Cách đi Kỳ Co tiết kiệm nhất?')" class="text-xs bg-white border border-blue-200 px-3 py-1.5 rounded-full shadow-sm text-blue-700">⛵ Đi Kỳ Co</button>
        <button onclick="quickAsk('Dạy tui vài câu tiếng Nẫu đi!')" class="text-xs bg-white border border-blue-200 px-3 py-1.5 rounded-full shadow-sm text-blue-700">🗣️ Học tiếng Nẫu</button>
    </div>

    <footer class="p-4 glass border-t border-blue-100">
        <div class="relative flex items-center">
            <input type="text" id="user-input" placeholder="Hỏi Tư Nẫu ngay..." 
                class="w-full pl-4 pr-12 py-3 rounded-2xl border border-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-inner">
            <button onclick="sendMessage()" class="absolute right-2 w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center hover:bg-blue-700 transition-all">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-400 mt-2">Dự án hỗ trợ du lịch Quy Nhơn - Thổ địa AI 4.0</p>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        // Hàm thêm tin nhắn vào màn hình
        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'ai' ? 'flex items-start gap-2' : 'flex items-start justify-end gap-2';
            
            const content = role === 'ai' 
                ? `<div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-sm">Tư</div>
                   <div class="bubble-ai bg-white p-3 shadow-sm border border-blue-50 text-sm leading-relaxed max-w-[85%]">${text}</div>`
                : `<div class="bubble-user p-3 shadow-md text-sm leading-relaxed max-w-[85%]">${text}</div>`;
            
            div.innerHTML = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';

            // Giả lập hiệu ứng đang trả lời
            const loadingId = Date.now();
            appendMessage('ai', `<i class="fa-solid fa-ellipsis fa-beat" id="${loadingId}"></i>`);

            // GỌI API AI Ở ĐÂY (Ví dụ Gemini API)
            // Thay đoạn setTimeout này bằng fetch() gọi tới Gemini/ChatGPT API
            setTimeout(() => {
                const loadingElement = document.getElementById(loadingId).parentElement;
                loadingElement.innerHTML = "Đang kết nối API... (Bạn cần chèn API Key vào code để Tư Nẫu trả lời thật nhen!)";
                
                // Demo phản hồi theo phong cách bản địa
                if(text.toLowerCase().includes("bùi thị xuân")) {
                    loadingElement.innerHTML = "Chu cha, ngay trường BTX thì ghé thử Nem chả Lợi nha, hoặc ra Ngô Mây ăn vặt rẻ rề hà! 😋";
                }
            }, 1000);
        }

        function quickAsk(msg) {
            userInput.value = msg;
            sendMessage();
        }

        // Enter để gửi
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
